version: 2

sources:
  - name: googles_analytics_4
    description: "Raw event data streamed from Google Analytics 4."
    schema: google_analytics_4
    tables:
      - name: events_20210131
        description: "Sharded daily event log table for January 31, 2021."
        columns:
          - name: event_timestamp
            description: "The timestamp when the event was logged."
            tests:
              - not_null
          - name: user_pseudo_id
            description: "The pseudonymous id for the user."
            tests:
              - not_null

  - name: google_sheets
    description: "Manual mapping data managed via Google Sheets and synced to the warehouse."
    schema: google_sheets
    tables:
      - name: account_manager_region_mapping
        description: "Lookup table mapping account managers to their respective operational regions."
        columns:
          - name: account_manager_id
            description: "Primary key for the account manager."
            tests:
              - unique
              - not_null
          - name: region
            description: "The geographic region assigned to the manager."
            tests:
              - not_null

  - name: sales_database
    description: "Primary transactional database (Databird) capturing core e-commerce operations."
    database: Databird
    schema: dbo
    tables:
      - name: user
        description: "Registered customers and platform users."
        columns:
          - name: user_id
            description: "Primary key of the user."
            tests:
              - not_null

      - name: seller
        description: "Registered merchants selling products on the platform."
        columns:
          - name: seller_id
            description: "Primary key of the seller."
            tests:
              - not_null

      - name: product
        description: "Catalog of items available for purchase."
        columns:
          - name: product_id
            description: "Primary key of the product."
            tests:
              - unique
              - not_null

      - name: order
        description: "High-level transactional order headers."
        columns:
          - name: order_id
            description: "Primary key of the order."
            tests:
              - unique
              - not_null
          - name: user_id
            description: "Foreign key referencing the user who placed the order."
            tests:
              - not_null
              - relationships:
                  to: source('sales_database', 'user')
                  field: user_id

      - name: order_item
        description: "Line-level items associated with each order."
        columns:
          - name: order_item_id
            description: "Primary key for the order line item."
            tests:
              - unique
              - not_null
          - name: order_id
            description: "Foreign key linking back to the parent order."
            tests:
              - not_null
              - relationships:
                  to: source('sales_database', 'order')
                  field: order_id
          - name: product_id
            description: "Foreign key linking to the product purchased."
            tests:
              - not_null
              - relationships:
                  to: source('sales_database', 'product')
                  field: product_id
          - name: seller_id
            description: "Foreign key linking to the seller of the product."
            tests:
              - not_null
              - relationships:
                  to: source('sales_database', 'seller')
                  field: seller_id

      - name: payment
        description: "Transaction payment details linked to orders."
        columns:
          - name: payment_id
            description: "Primary key of the payment record."
            tests:
              - unique
              - not_null
          - name: order_id
            description: "Foreign key referencing the order being paid for."
            tests:
              - not_null
              - relationships:
                  to: source('sales_database', 'order')
                  field: order_id

      - name: feedback
        description: "Customer reviews and feedback regarding their purchases."
        columns:
          - name: feedback_id
            description: "Primary key of the feedback entry."
            tests:
              - unique
              - not_null
          - name: order_id
            description: "Foreign key linking the feedback to a specific order."
            tests:
              - not_null
              - relationships:
                  to: source('sales_database', 'order')
                  field: order_id